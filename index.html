<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azu Accesorios</title>
  <meta name="description" content="Accesorios únicos y delicados — pide directo por WhatsApp" />

  <!-- Favicon: el propio logo -->
  <link rel="icon" type="image/jpeg" href="Logo.jpeg" />

  <!-- Fuentes: Cormorant Garamond (serif elegante como en el logo) + Jost (sans moderna) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       🎨  PALETA AZU ACCESORIOS — inspirada en el logo
       ============================================================ */
    :root {
      --rosa-suave: #f5d9dc;
      --rosa-polvo: #e8b8bf;
      --lila-claro: #d4c4e0;
      --lila-medio: #a890bd;
      --lila-oscuro: #7d6591;
      --dorado: #c9a876;
      --dorado-claro: #e0cba5;
      --crema: #fbf7f2;
      --crema-tarjeta: #ffffff;
      --texto-principal: #4a3d52;
      --texto-suave: #8a7d92;
      --borde-suave: #ede3ea;
      --whatsapp: #25d366;
      --agotado: #b06060;
      --sombra-suave: 0 2px 20px rgba(168, 144, 189, 0.08);
      --sombra-hover: 0 10px 40px rgba(168, 144, 189, 0.18);
      --radio: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', -apple-system, sans-serif;
      font-weight: 400;
      background: var(--crema);
      background-image:
        radial-gradient(ellipse at top left, rgba(245, 217, 220, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(212, 196, 224, 0.3) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--texto-principal);
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* ============================================================
       Header con logo centrado
       ============================================================ */
    header {
      text-align: center;
      padding: 32px 16px 24px;
      position: relative;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo-container img {
      max-width: 280px;
      width: 80%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(168, 144, 189, 0.15);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--lila-medio);
      margin-top: 14px;
      letter-spacing: 0.05em;
    }

    .ornamento {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 16px auto;
      max-width: 200px;
      color: var(--dorado);
    }
    .ornamento::before,
    .ornamento::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dorado), transparent);
    }
    .ornamento svg { width: 16px; height: 16px; }

    /* ============================================================
       Contenedor principal
       ============================================================ */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 16px 80px;
    }

    /* ============================================================
       Controles (buscador + filtros)
       ============================================================ */
    .controles {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .buscador-wrap { position: relative; }

    .buscador {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-size: 0.95rem;
      border: 1px solid var(--borde-suave);
      border-radius: 100px;
      background: var(--crema-tarjeta);
      color: var(--texto-principal);
      font-family: inherit;
      transition: all 0.3s;
      box-shadow: var(--sombra-suave);
    }
    .buscador::placeholder {
      color: var(--texto-suave);
      font-style: italic;
    }
    .buscador:focus {
      outline: none;
      border-color: var(--lila-medio);
      box-shadow: 0 0 0 4px rgba(168, 144, 189, 0.1);
    }

    .buscador-icono {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--lila-medio);
      pointer-events: none;
    }

    .categorias {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px;
      scrollbar-width: thin;
    }
    .categorias::-webkit-scrollbar { height: 4px; }
    .categorias::-webkit-scrollbar-thumb { background: var(--rosa-polvo); border-radius: 4px; }

    .chip {
      padding: 10px 20px;
      border: 1px solid var(--borde-suave);
      border-radius: 100px;
      background: var(--crema-tarjeta);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      color: var(--texto-suave);
      font-family: 'Jost', sans-serif;
    }
    .chip:hover {
      border-color: var(--lila-medio);
      color: var(--lila-oscuro);
      transform: translateY(-1px);
    }
    .chip.activo {
      background: linear-gradient(135deg, var(--lila-medio), var(--rosa-polvo));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(168, 144, 189, 0.3);
    }

    /* ============================================================
       Grid de productos
       ============================================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .tarjeta {
      background: var(--crema-tarjeta);
      border-radius: var(--radio);
      overflow: hidden;
      box-shadow: var(--sombra-suave);
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      border: 1px solid rgba(237, 227, 234, 0.6);
    }
    .tarjeta:hover {
      transform: translateY(-6px);
      box-shadow: var(--sombra-hover);
      border-color: var(--rosa-polvo);
    }

    .badge-destacado {
      position: absolute;
      top: 12px;
      left: 12px;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
      color: white;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 100px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 1;
      box-shadow: 0 2px 8px rgba(201, 168, 118, 0.3);
    }

    .foto-wrap {
      position: relative;
      aspect-ratio: 1;
      background: linear-gradient(135deg, var(--rosa-suave), var(--lila-claro));
      overflow: hidden;
    }
    .foto-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .tarjeta:hover .foto-wrap img { transform: scale(1.08); }

    .foto-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: var(--texto-suave);
      font-size: 0.85rem;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    .agotado-overlay {
      position: absolute;
      inset: 0;
      background: rgba(251, 247, 242, 0.85);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      color: var(--agotado);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 1rem;
    }

    .info {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .categoria-etiqueta {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--dorado);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .nombre {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--texto-principal);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .descripcion {
      font-size: 0.85rem;
      color: var(--texto-suave);
      margin-bottom: 16px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .precio-stock {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: auto;
      margin-bottom: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--borde-suave);
    }
    .precio {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--lila-oscuro);
    }
    .stock {
      font-size: 0.72rem;
      color: var(--texto-suave);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .stock.bajo { color: var(--dorado); font-weight: 500; }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: var(--whatsapp);
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      font-family: 'Jost', sans-serif;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
    }
    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.35);
    }
    .btn-whatsapp:disabled {
      background: #d4c8ce;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .btn-whatsapp svg { width: 16px; height: 16px; }

    /* ============================================================
       Estados
       ============================================================ */
    .estado {
      text-align: center;
      padding: 80px 20px;
      color: var(--texto-suave);
    }
    .estado h2 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: var(--lila-oscuro);
      font-style: italic;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--rosa-suave);
      border-top-color: var(--lila-medio);
      border-radius: 50%;
      animation: girar 0.9s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    /* ============================================================
       Footer
       ============================================================ */
    footer {
      text-align: center;
      padding: 32px 16px;
      color: var(--texto-suave);
      font-size: 0.82rem;
      border-top: 1px solid var(--borde-suave);
      background: var(--crema-tarjeta);
      margin-top: 40px;
    }
    footer .marca {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--lila-medio);
      font-size: 1rem;
    }

    /* ============================================================
       Animación de entrada
       ============================================================ */
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .tarjeta { animation: aparecer 0.5s ease backwards; }
    .tarjeta:nth-child(1) { animation-delay: 0.02s; }
    .tarjeta:nth-child(2) { animation-delay: 0.06s; }
    .tarjeta:nth-child(3) { animation-delay: 0.1s; }
    .tarjeta:nth-child(4) { animation-delay: 0.14s; }
    .tarjeta:nth-child(5) { animation-delay: 0.18s; }
    .tarjeta:nth-child(6) { animation-delay: 0.22s; }

    /* ============================================================
       Móvil
       ============================================================ */
    @media (max-width: 520px) {
      header { padding: 24px 16px 16px; }
      .logo-container img { max-width: 220px; }
      .tagline { font-size: 0.95rem; }
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      .info { padding: 14px 14px 16px; }
      .nombre { font-size: 1.05rem; }
      .descripcion { font-size: 0.78rem; margin-bottom: 12px; }
      .precio { font-size: 1.15rem; }
      .btn-whatsapp { font-size: 0.72rem; padding: 10px; }
      .categoria-etiqueta { font-size: 0.62rem; }
      .chip { padding: 8px 16px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="Logo.jpeg" alt="Azu Accesorios" />
    </div>
    <p class="tagline">Delicadeza en cada detalle</p>
    <div class="ornamento">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z"/></svg>
    </div>
  </header>

  <main>
    <div class="controles">
      <div class="buscador-wrap">
        <svg class="buscador-icono" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          class="buscador"
          id="buscador"
          placeholder="Buscar producto..."
          autocomplete="off"
        />
      </div>
      <div class="categorias" id="categorias">
        <!-- Chips generados dinámicamente -->
      </div>
    </div>

    <div id="contenido">
      <div class="estado">
        <div class="spinner"></div>
        <p style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem;">Cargando colección...</p>
      </div>
    </div>
  </main>

  <footer>
    <p>© <span id="anio"></span> <span class="marca">Azu Accesorios</span></p>
    <p style="margin-top: 6px; font-size: 0.75rem;">Hecho con cariño ✿</p>
  </footer>

  <script>
    /* ============================================================
       ⚙️  CONFIGURACIÓN — EDITA ESTOS 2 VALORES
       ============================================================ */
    const API_URL = 'https://script.google.com/macros/s/AKfycbz8i7RDD5GViPlXmMJTNCrNvkeZIVNiDovfUR4vmyFbp-t5KaztfvEPQwIndnnwHyKYow/exec';
    const WHATSAPP_NUMERO = '573147998607'; // Código país + número, sin + ni espacios

    /* ============================================================
       Código de la aplicación
       ============================================================ */

    let productos = [];
    let categoriaActiva = 'todas';
    let textoBusqueda = '';

    const formatearPrecio = (num) => {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        maximumFractionDigits: 0
      }).format(num);
    };

    const generarLinkWhatsApp = (producto) => {
      const texto = `¡Hola Azu! ✿ Me encantó este producto:\n\n` +
                    `*${producto.nombre}*\n` +
                    `Precio: ${formatearPrecio(producto.precio)}\n` +
                    `ID: ${producto.id}\n\n` +
                    `¿Está disponible?`;
      return `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(texto)}`;
    };

    const capitalizar = (texto) => {
      return texto.charAt(0).toUpperCase() + texto.slice(1).toLowerCase();
    };

    const renderizarProductos = () => {
      const contenedor = document.getElementById('contenido');

      const filtrados = productos.filter(p => {
        const coincideCategoria = categoriaActiva === 'todas' || p.categoria === categoriaActiva;
        const coincideBusqueda = !textoBusqueda ||
          p.nombre.toLowerCase().includes(textoBusqueda) ||
          p.descripcion.toLowerCase().includes(textoBusqueda);
        return coincideCategoria && coincideBusqueda;
      });

      if (filtrados.length === 0) {
        contenedor.innerHTML = `
          <div class="estado">
            <h2>Sin resultados</h2>
            <p>No encontramos productos con esos criterios.</p>
          </div>`;
        return;
      }

      const html = '<div class="grid">' + filtrados.map(p => {
        const agotado = p.stock <= 0;
        const stockBajo = p.stock > 0 && p.stock <= 3;

        const fotoHTML = p.foto_url
          ? `<img src="${p.foto_url}" alt="${p.nombre}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=foto-placeholder>Sin imagen</div>'" />`
          : `<div class="foto-placeholder">Sin imagen</div>`;

        return `
          <article class="tarjeta">
            ${p.destacado ? '<span class="badge-destacado">Destacado</span>' : ''}
            <div class="foto-wrap">
              ${fotoHTML}
              ${agotado ? '<div class="agotado-overlay">Agotado</div>' : ''}
            </div>
            <div class="info">
              ${p.categoria ? `<span class="categoria-etiqueta">${capitalizar(p.categoria)}</span>` : ''}
              <h3 class="nombre">${p.nombre}</h3>
              ${p.descripcion ? `<p class="descripcion">${p.descripcion}</p>` : ''}
              <div class="precio-stock">
                <span class="precio">${formatearPrecio(p.precio)}</span>
                ${!agotado ? `<span class="stock ${stockBajo ? 'bajo' : ''}">${stockBajo ? `Solo ${p.stock}` : `${p.stock} disp.`}</span>` : ''}
              </div>
              ${agotado
                ? `<button class="btn-whatsapp" disabled>Agotado</button>`
                : `<a href="${generarLinkWhatsApp(p)}" target="_blank" rel="noopener" class="btn-whatsapp">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Pedir
                  </a>`}
            </div>
          </article>`;
      }).join('') + '</div>';

      contenedor.innerHTML = html;
    };

    const renderizarCategorias = (categorias) => {
      const cont = document.getElementById('categorias');
      const chips = [
        `<button class="chip activo" data-cat="todas">Todas</button>`,
        ...categorias.map(c => `<button class="chip" data-cat="${c}">${capitalizar(c)}</button>`)
      ].join('');
      cont.innerHTML = chips;

      cont.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          cont.querySelectorAll('.chip').forEach(c => c.classList.remove('activo'));
          chip.classList.add('activo');
          categoriaActiva = chip.dataset.cat;
          renderizarProductos();
        });
      });
    };

    const cargarProductos = async () => {
      const ahora = Date.now();
      const CACHE_MS = 5 * 60 * 1000;
      if (window._catalogoCache && window._catalogoTiempo &&
          (ahora - window._catalogoTiempo) < CACHE_MS) {
        return window._catalogoCache;
      }

      const respuesta = await fetch(API_URL);
      if (!respuesta.ok) throw new Error('Error de red: ' + respuesta.status);
      const datos = await respuesta.json();
      if (!datos.ok) throw new Error(datos.error || 'Error desconocido');

      window._catalogoCache = datos;
      window._catalogoTiempo = ahora;
      return datos;
    };

    const iniciar = async () => {
      document.getElementById('anio').textContent = new Date().getFullYear();

      if (API_URL === 'PEGA_AQUI_LA_URL_DE_APPS_SCRIPT') {
        document.getElementById('contenido').innerHTML = `
          <div class="estado">
            <h2>Falta configurar la API</h2>
            <p>Edita el archivo index.html y reemplaza <code>API_URL</code> con tu URL de Apps Script.</p>
          </div>`;
        return;
      }

      try {
        const datos = await cargarProductos();
        productos = datos.productos || [];
        renderizarCategorias(datos.categorias || []);
        renderizarProductos();
      } catch (err) {
        console.error(err);
        document.getElementById('contenido').innerHTML = `
          <div class="estado">
            <h2>No pudimos cargar el catálogo</h2>
            <p>${err.message}</p>
          </div>`;
      }
    };

    document.getElementById('buscador').addEventListener('input', (e) => {
      textoBusqueda = e.target.value.trim().toLowerCase();
      renderizarProductos();
    });

    iniciar();
  </script>
</body>
</html>
