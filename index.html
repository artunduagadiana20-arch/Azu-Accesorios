<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Tienda de Accesorios</title>
  <meta name="description" content="Catálogo de accesorios — pide por WhatsApp" />

  <!-- Fuente elegante -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       ⚙️  CONFIGURACIÓN VISUAL (colores, fuentes) — edita a gusto
       ============================================================ */
    :root {
      --color-primario: #b8875a;        /* dorado suave - para botones y acentos */
      --color-primario-hover: #9a6f47;
      --color-fondo: #faf7f2;            /* beige muy claro */
      --color-tarjeta: #ffffff;
      --color-texto: #2b2520;
      --color-texto-suave: #7a6f66;
      --color-borde: #ebe4d9;
      --color-whatsapp: #25d366;
      --color-agotado: #c45252;
      --sombra-tarjeta: 0 2px 12px rgba(60, 40, 20, 0.06);
      --sombra-hover: 0 8px 28px rgba(60, 40, 20, 0.12);
      --radio: 14px;
    }

    /* ============================================================
       Reset y base
       ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-fondo);
      color: var(--color-texto);
      line-height: 1.5;
      min-height: 100vh;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 700; }

    /* ============================================================
       Header
       ============================================================ */
    header {
      background: var(--color-tarjeta);
      border-bottom: 1px solid var(--color-borde);
      padding: 24px 16px;
      text-align: center;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--color-texto);
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--color-texto-suave);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* ============================================================
       Contenedor principal
       ============================================================ */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ============================================================
       Barra de búsqueda y filtros
       ============================================================ */
    .controles {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .buscador {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid var(--color-borde);
      border-radius: var(--radio);
      background: var(--color-tarjeta);
      font-family: inherit;
      color: var(--color-texto);
      transition: border-color 0.2s;
    }
    .buscador:focus {
      outline: none;
      border-color: var(--color-primario);
    }

    .categorias {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .categorias::-webkit-scrollbar { height: 4px; }
    .categorias::-webkit-scrollbar-thumb { background: var(--color-borde); border-radius: 4px; }

    .chip {
      padding: 8px 16px;
      border: 1px solid var(--color-borde);
      border-radius: 999px;
      background: var(--color-tarjeta);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      color: var(--color-texto);
      font-family: inherit;
    }
    .chip:hover { border-color: var(--color-primario); }
    .chip.activo {
      background: var(--color-primario);
      color: white;
      border-color: var(--color-primario);
    }

    /* ============================================================
       Grid de productos
       ============================================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .tarjeta {
      background: var(--color-tarjeta);
      border-radius: var(--radio);
      overflow: hidden;
      box-shadow: var(--sombra-tarjeta);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .tarjeta:hover {
      transform: translateY(-4px);
      box-shadow: var(--sombra-hover);
    }

    .badge-destacado {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--color-primario);
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 1;
    }

    .foto-wrap {
      position: relative;
      aspect-ratio: 1;
      background: #f0ebe2;
      overflow: hidden;
    }
    .foto-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .tarjeta:hover .foto-wrap img { transform: scale(1.05); }

    .foto-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: var(--color-texto-suave);
      font-size: 0.875rem;
    }

    .agotado-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--color-agotado);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .info {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .nombre {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--color-texto);
    }
    .descripcion {
      font-size: 0.85rem;
      color: var(--color-texto-suave);
      margin-bottom: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .precio-stock {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      margin-bottom: 12px;
    }
    .precio {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--color-texto);
    }
    .stock {
      font-size: 0.75rem;
      color: var(--color-texto-suave);
    }
    .stock.bajo { color: #d97706; }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      background: var(--color-whatsapp);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      font-family: inherit;
    }
    .btn-whatsapp:hover { opacity: 0.9; }
    .btn-whatsapp:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.7;
    }
    .btn-whatsapp svg { width: 18px; height: 18px; }

    /* ============================================================
       Estados (cargando, vacío, error)
       ============================================================ */
    .estado {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-texto-suave);
    }
    .estado h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: var(--color-texto);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-borde);
      border-top-color: var(--color-primario);
      border-radius: 50%;
      animation: girar 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    /* ============================================================
       Footer
       ============================================================ */
    footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--color-texto-suave);
      font-size: 0.8rem;
      border-top: 1px solid var(--color-borde);
      background: var(--color-tarjeta);
    }

    /* ============================================================
       Móvil: ajustes de tamaño
       ============================================================ */
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .info { padding: 10px 12px 12px; }
      .nombre { font-size: 0.9rem; }
      .descripcion { font-size: 0.78rem; }
      .precio { font-size: 1rem; }
      .btn-whatsapp { font-size: 0.8rem; padding: 8px; }
    }
  </style>
</head>
<body>

  <header>
    <h1 id="titulo-tienda">Mi Tienda de Accesorios</h1>
    <p>Pide directo por WhatsApp ✨</p>
  </header>

  <main>
    <div class="controles">
      <input
        type="text"
        class="buscador"
        id="buscador"
        placeholder="🔍 Buscar producto..."
        autocomplete="off"
      />
      <div class="categorias" id="categorias">
        <!-- Los chips se generan dinámicamente -->
      </div>
    </div>

    <div id="contenido">
      <div class="estado">
        <div class="spinner"></div>
        <p>Cargando productos...</p>
      </div>
    </div>
  </main>

  <footer>
    <p>© <span id="anio"></span> <span id="nombre-footer"></span></p>
  </footer>

  <script>
    /* ============================================================
       ⚙️  CONFIGURACIÓN — EDITA ESTOS 3 VALORES
       ============================================================ */
    const API_URL = 'https://script.google.com/macros/s/AKfycbwx_Lh2hFpCfJMRxoHYMTwyWOU8M-Tfg5A0EbWX_p0a3u7YCdtRgPaT-Ib4V3K4BOk0/exec';
    const WHATSAPP_NUMERO = '573147998607'; // Código país + número, sin + ni espacios
    const NOMBRE_TIENDA = 'Azu Accesorios';

    /* ============================================================
       Código de la aplicación (no necesitas editarlo)
       ============================================================ */

    // Estado global
    let productos = [];
    let categoriaActiva = 'todas';
    let textoBusqueda = '';

    // Formateador de precio en pesos colombianos
    const formatearPrecio = (num) => {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        maximumFractionDigits: 0
      }).format(num);
    };

    // Arma el mensaje de WhatsApp con el producto seleccionado
    const generarLinkWhatsApp = (producto) => {
      const texto = `¡Hola! 👋 Me interesa este producto:\n\n` +
                    `*${producto.nombre}*\n` +
                    `Precio: ${formatearPrecio(producto.precio)}\n` +
                    `ID: ${producto.id}\n\n` +
                    `¿Está disponible?`;
      return `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(texto)}`;
    };

    // Renderiza las tarjetas de producto
    const renderizarProductos = () => {
      const contenedor = document.getElementById('contenido');

      // Filtrar por categoría y búsqueda
      const filtrados = productos.filter(p => {
        const coincideCategoria = categoriaActiva === 'todas' || p.categoria === categoriaActiva;
        const coincideBusqueda = !textoBusqueda ||
          p.nombre.toLowerCase().includes(textoBusqueda) ||
          p.descripcion.toLowerCase().includes(textoBusqueda);
        return coincideCategoria && coincideBusqueda;
      });

      if (filtrados.length === 0) {
        contenedor.innerHTML = `
          <div class="estado">
            <h2>Sin resultados</h2>
            <p>No encontramos productos con esos criterios.</p>
          </div>`;
        return;
      }

      const html = '<div class="grid">' + filtrados.map(p => {
        const agotado = p.stock <= 0;
        const stockBajo = p.stock > 0 && p.stock <= 3;

        const fotoHTML = p.foto_url
          ? `<img src="${p.foto_url}" alt="${p.nombre}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=foto-placeholder>Sin imagen</div>'" />`
          : `<div class="foto-placeholder">Sin imagen</div>`;

        return `
          <article class="tarjeta">
            ${p.destacado ? '<span class="badge-destacado">Destacado</span>' : ''}
            <div class="foto-wrap">
              ${fotoHTML}
              ${agotado ? '<div class="agotado-overlay">Agotado</div>' : ''}
            </div>
            <div class="info">
              <h3 class="nombre">${p.nombre}</h3>
              ${p.descripcion ? `<p class="descripcion">${p.descripcion}</p>` : ''}
              <div class="precio-stock">
                <span class="precio">${formatearPrecio(p.precio)}</span>
                ${!agotado ? `<span class="stock ${stockBajo ? 'bajo' : ''}">${stockBajo ? `¡Solo ${p.stock}!` : `${p.stock} disp.`}</span>` : ''}
              </div>
              ${agotado
                ? `<button class="btn-whatsapp" disabled>Agotado</button>`
                : `<a href="${generarLinkWhatsApp(p)}" target="_blank" rel="noopener" class="btn-whatsapp">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Pedir por WhatsApp
                  </a>`}
            </div>
          </article>`;
      }).join('') + '</div>';

      contenedor.innerHTML = html;
    };

    // Renderiza los chips de categorías
    const renderizarCategorias = (categorias) => {
      const cont = document.getElementById('categorias');
      const chips = [
        `<button class="chip activo" data-cat="todas">Todas</button>`,
        ...categorias.map(c => `<button class="chip" data-cat="${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</button>`)
      ].join('');
      cont.innerHTML = chips;

      cont.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          cont.querySelectorAll('.chip').forEach(c => c.classList.remove('activo'));
          chip.classList.add('activo');
          categoriaActiva = chip.dataset.cat;
          renderizarProductos();
        });
      });
    };

    // Carga de datos (con caché de 5 minutos para no saturar Apps Script)
    const CACHE_MINUTOS = 5;
    const cargarProductos = async () => {
      const cacheKey = 'catalogo_cache';
      const cacheTime = 'catalogo_tiempo';

      // Revisar caché en memoria (la recarga de página lo limpia, pero evita llamadas dentro de la misma sesión)
      const ahora = Date.now();
      const tiempoCache = window._catalogoTiempo;
      if (window._catalogoCache && tiempoCache && (ahora - tiempoCache) < CACHE_MINUTOS * 60 * 1000) {
        return window._catalogoCache;
      }

      const respuesta = await fetch(API_URL);
      if (!respuesta.ok) throw new Error('Error de red: ' + respuesta.status);
      const datos = await respuesta.json();
      if (!datos.ok) throw new Error(datos.error || 'Error desconocido');

      window._catalogoCache = datos;
      window._catalogoTiempo = ahora;
      return datos;
    };

    // Inicialización
    const iniciar = async () => {
      // Nombre de tienda
      document.getElementById('titulo-tienda').textContent = NOMBRE_TIENDA;
      document.getElementById('nombre-footer').textContent = NOMBRE_TIENDA;
      document.getElementById('anio').textContent = new Date().getFullYear();
      document.title = NOMBRE_TIENDA;

      // Verificar configuración
      if (API_URL === 'PEGA_AQUI_LA_URL_DE_APPS_SCRIPT') {
        document.getElementById('contenido').innerHTML = `
          <div class="estado">
            <h2>⚠️ Falta configurar la API</h2>
            <p>Edita el archivo index.html y reemplaza <code>API_URL</code> con la URL de tu Apps Script.</p>
          </div>`;
        return;
      }

      try {
        const datos = await cargarProductos();
        productos = datos.productos || [];
        renderizarCategorias(datos.categorias || []);
        renderizarProductos();
      } catch (err) {
        console.error(err);
        document.getElementById('contenido').innerHTML = `
          <div class="estado">
            <h2>No pudimos cargar el catálogo</h2>
            <p>${err.message}</p>
            <p style="margin-top:12px;font-size:0.85rem">Revisa la guía de implementación si el problema persiste.</p>
          </div>`;
      }
    };

    // Búsqueda en vivo
    document.getElementById('buscador').addEventListener('input', (e) => {
      textoBusqueda = e.target.value.trim().toLowerCase();
      renderizarProductos();
    });

    // Arrancar al cargar la página
    iniciar();
  </script>
</body>
</html>
